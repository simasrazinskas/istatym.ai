# pnpm (v11) stores install settings here. This is NOT a multi-package
# workspace — there is no `packages:` key, so this stays a self-contained app.

# esbuild backs `tsx`, used to run the ingest CLI and the DB smoke test, so its
# build is allowed. The rest are optional transitive deps not required for the
# standalone server (sharp = image optimization, unrs-resolver = eslint resolver).
allowBuilds:
  esbuild: true
  sharp: false
  unrs-resolver: false

# Allow these recently published pinned versions past the release-age gate.
minimumReleaseAgeExclude:
  - '@ai-sdk/anthropic@3.0.90'
  - '@ai-sdk/gateway@3.0.140'
  - 'ai@6.0.216'
